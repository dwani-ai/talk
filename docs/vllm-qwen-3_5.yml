services:
  vllm:
    image: vllm/vllm-openai:nightly
    ports:
      - "10802:10802"
    command: [
      "--model","Qwen/Qwen3.5-0.8B",
      "--served-model-name", "gemma3",
      "--host", "0.0.0.0",
      "--port", "10802",
      "--gpu-memory-utilization", "0.8",
      "--language-model-only",
      "--reasoning-parser", "qwen3"
    ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
