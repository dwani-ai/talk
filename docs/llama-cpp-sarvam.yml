services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: sarvam-30b-server
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/sarvam-30b-Q4_K_M.gguf-00001-of-00006.gguf
      --ctx-size 4096
      --n-gpu-layers 99
      --host 0.0.0.0
      --port 8080
      --jinja
      --alias gemma3