# Integrated stack: TTS (tts-indic-server), ASR (asr-indic-server), LLM (llama-server / Sarvam GGUF).
# Copy .env.example to .env. UI at http://localhost:80 — proxies /v1 to backend. LLM API on host :10802.
services:
  talk:
    image: dwani/talk-server:${DWANI_TALK_SERVER_TAG:-latest}
    expose:
      - "8000"
    depends_on:
      tts-indic-server:
        condition: service_started
      llama-server:
        condition: service_started
      agents:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      DWANI_API_BASE_URL_TTS: http://tts-indic-server:10804
      DWANI_API_BASE_URL_ASR: http://asr-indic-server:10803
      DWANI_API_BASE_URL_LLM: http://llama-server:8080
      DWANI_LLM_MODEL: ${DWANI_LLM_MODEL:-sarvam}
      DWANI_AGENT_BASE_URL: http://agents:8081
      DWANI_REDIS_URL: ${DWANI_REDIS_URL:-redis://redis:6379/0}
      DWANI_DATABASE_URL: ${DWANI_DATABASE_URL:-postgresql+psycopg://talk:talk@postgres:5432/talk}
      DWANI_API_KEY: ${DWANI_API_KEY:-}
      DWANI_AUTH_COOKIE_NAME: ${DWANI_AUTH_COOKIE_NAME:-dwani_auth_session}
      DWANI_AUTH_SESSION_TTL_SECONDS: ${DWANI_AUTH_SESSION_TTL_SECONDS:-86400}
      DWANI_AUTH_COOKIE_SAMESITE: ${DWANI_AUTH_COOKIE_SAMESITE:-lax}
      DWANI_AUTH_COOKIE_SECURE: ${DWANI_AUTH_COOKIE_SECURE:-0}
      DWANI_LLM_API_KEY: ${DWANI_LLM_API_KEY:-dummy}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  talk-ui:
    image: dwani/talk-ux:${DWANI_TALK_UI_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      talk:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  asr-indic-server:
    image: dwani/asr-indic-server:latest
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - 10803:10803
    environment:
      - HF_TOKEN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  tts-indic-server:
    image: dwani/tts-indic-server:latest
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "10804:10804"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      TTS_NFE_STEPS: 8
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: sarvam-30b-server
    restart: unless-stopped
    ports:
      - "10802:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/sarvam-30b-Q4_K_M.gguf-00001-of-00006.gguf
      --ctx-size 4096
      --n-gpu-layers 99
      --host 0.0.0.0
      --port 8080
      --jinja

  agents:
    image: dwani/talk-agents:${DWANI_TALK_AGENTS_TAG:-latest}
    expose:
      - "8081"
    depends_on:
      - llama-server
    environment:
      LITELLM_MODEL_NAME: ${LITELLM_MODEL_NAME:-openai/sarvam-30b-Q4_K_M.gguf-00001-of-00006.gguf}
      LITELLM_API_BASE: http://llama-server:8080/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-}
      AGENTS_ALLOWED_ORIGINS: ${AGENTS_ALLOWED_ORIGINS:-http://localhost}
      AGENTS_REDIS_URL: ${AGENTS_REDIS_URL:-redis://redis:6379/1}
    volumes:
      - fix_my_city_data:/app/fix-my-city/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DWANI_POSTGRES_USER:-talk}
      POSTGRES_PASSWORD: ${DWANI_POSTGRES_PASSWORD:-talk}
      POSTGRES_DB: ${DWANI_POSTGRES_DB:-talk}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DWANI_POSTGRES_USER:-talk} -d ${DWANI_POSTGRES_DB:-talk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - talk_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  fix_my_city_data:
  talk_postgres_data:
